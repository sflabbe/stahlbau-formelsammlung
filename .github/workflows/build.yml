name: build-pdf

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-luatex texlive-latex-recommended texlive-latex-extra texlive-lang-german texlive-fonts-recommended
      - name: Build PDF
        run: make
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: schraubenverbindungen-pdf
          path: dist/schraubenverbindungen.pdf
